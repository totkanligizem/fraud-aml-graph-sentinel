name: sample-smoke

on:
  push:
    branches:
      - main
      - master
      - "codex/**"
  pull_request:

jobs:
  sample-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install runtime dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run sample end-to-end smoke pipeline
        run: |
          make sample-e2e
